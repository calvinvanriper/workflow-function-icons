<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

<!-- Pause outer ring: centered circle with controlled right-side gap -->
<circle
  cx="46"
  cy="46"
  r="28"
  fill="none"
  stroke="#000000"
  stroke-width="3.2"
  stroke-linecap="round"
  stroke-dasharray="130 75"
  transform="rotate(65 46 46)"
/>

  <!-- Pause bars -->
  <rect x="37" y="31" width="7" height="30" rx="2" fill="#000000"/>
  <rect x="48" y="31" width="7" height="30" rx="2" fill="#000000"/>

  <!-- Coffee steam -->
  <path d="M72 48 C70 45 70 42 72 39" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
  <path d="M79 48 C77 45 77 42 79 39" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round"/>

  <!-- Coffee cup outline -->
  <path
    d="M65 52
       H84
       V65
       C84 72 79 76 73 76
       C67 76 62 72 62 65
       V52
       H65"
    fill="none"
    stroke="#000000"
    stroke-width="3.2"
    stroke-linejoin="round"
  />

  <!-- Coffee handle -->
  <path
    d="M84 56
       H89
       C92 56 93 58 93 61
       C93 64 92 66 89 66
       H84"
    fill="none"
    stroke="#000000"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

</svg>
